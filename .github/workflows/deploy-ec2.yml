name: Deploy to EC2

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to deploy
        required: false
        default: main

concurrency:
  group: siged-lampa-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_DIR: project/siged-lampa/versions/v0002
  EC2_DIR: /opt/siged-lampa

  RELEASE_ID: ${{ github.run_number }}-${{ github.sha }}
  ARTIFACT_NAME: siged-lampa-release-${{ github.run_number }}
  ARCHIVE_NAME: siged-lampa-release-${{ github.run_number }}.tar.gz

jobs:
  # =========================================================
  # VALIDACIÓN CI
  # =========================================================
  validate:
    name: Validate application
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine

        env:
          POSTGRES_DB: siged_lampa_qa
          POSTGRES_USER: siged
          POSTGRES_PASSWORD: siged_ci_password

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U siged -d siged_lampa_qa"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      CI: "true"

      APP_ENV: test
      NODE_ENV: test
      PERSISTENCE_MODE: postgres

      POSTGRES_DB: siged_lampa_qa
      POSTGRES_USER: siged
      POSTGRES_PASSWORD: siged_ci_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

      DATABASE_URL: postgresql://siged:siged_ci_password@127.0.0.1:5432/siged_lampa_qa

      PORT: 3100

      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      JWT_EXPIRES_IN: 1h

      BODY_LIMIT: 10mb

      DB_POOL_MIN: 0
      DB_POOL_MAX: 10
      DB_CONNECTION_TIMEOUT_MS: 5000
      DB_QUERY_TIMEOUT_MS: 10000

      DOCUMENT_MAX_FILE_BYTES: 10485760
      DOCUMENT_STORAGE_DIR: /tmp/siged-documents

      OIRS_TRACKING_TOKEN_TTL: 90d

      VITE_API_BASE_URL: /api
      VITE_REQUEST_TIMEOUT_MS: 12000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.ref
                || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            project/siged-lampa/versions/v0002/package-lock.json
            project/siged-lampa/versions/v0002/frontend/package-lock.json
            project/siged-lampa/versions/v0002/backend/package-lock.json

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -Eeuo pipefail

          sudo apt-get update
          sudo apt-get install -y postgresql-client

          psql --version
          pg_isready --version

      - name: Prepare CI environment
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p /tmp/siged-documents

          test -d "${PROJECT_DIR}/frontend"
          test -d "${PROJECT_DIR}/backend"
          test -d "${PROJECT_DIR}/database"
          test -d "${PROJECT_DIR}/infra"

      # -----------------------------------------------------
      # FRONTEND
      # -----------------------------------------------------
      - name: Install frontend dependencies
        working-directory: project/siged-lampa/versions/v0002/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: project/siged-lampa/versions/v0002/frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: project/siged-lampa/versions/v0002/frontend
        run: npm test

      - name: Frontend build
        working-directory: project/siged-lampa/versions/v0002/frontend
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: /api
          VITE_REQUEST_TIMEOUT_MS: 12000
        run: npm run build

      # -----------------------------------------------------
      # BASE DE DATOS QA
      # -----------------------------------------------------
      - name: Install V2 root dependencies
        working-directory: project/siged-lampa/versions/v0002
        run: npm ci

      - name: Wait for PostgreSQL QA
        shell: bash
        run: |
          set -Eeuo pipefail

          for attempt in $(seq 1 30); do
            if pg_isready \
              -h 127.0.0.1 \
              -p 5432 \
              -U siged \
              -d siged_lampa_qa
            then
              echo "PostgreSQL QA is ready"
              exit 0
            fi

            echo "Waiting for PostgreSQL QA: attempt ${attempt}/30"
            sleep 2
          done

          echo "FATAL: PostgreSQL QA did not become ready"
          exit 1

      - name: Validate migration and seed inventory
        working-directory: project/siged-lampa/versions/v0002
        shell: bash
        run: |
          set -Eeuo pipefail

          MIGRATION_COUNT="$(
            find database/migrations \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | wc -l \
              | tr -d '[:space:]'
          )"

          SEED_COUNT="$(
            find database/seeds \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | wc -l \
              | tr -d '[:space:]'
          )"

          echo "Migrations found: ${MIGRATION_COUNT}"
          echo "Seeds found: ${SEED_COUNT}"

          if [ "${MIGRATION_COUNT}" -ne 17 ]; then
            echo "FATAL: Expected 17 migration files"

            find database/migrations \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | sort

            exit 1
          fi

          if [ "${SEED_COUNT}" -ne 5 ]; then
            echo "FATAL: Expected 5 seed files"

            find database/seeds \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | sort

            exit 1
          fi

      - name: Apply QA migrations
        working-directory: project/siged-lampa/versions/v0002
        shell: bash
        run: |
          set -Eeuo pipefail

          node database/scripts/migrate.js

      - name: Apply QA seeds
        working-directory: project/siged-lampa/versions/v0002
        shell: bash
        run: |
          set -Eeuo pipefail

          node database/scripts/seed.js

      - name: Verify QA schema
        working-directory: project/siged-lampa/versions/v0002
        shell: bash
        run: |
          set -Eeuo pipefail

          node database/scripts/verify-schema.js

          MIGRATION_COUNT="$(
            psql "${DATABASE_URL}" \
              -Atc "SELECT COUNT(*) FROM schema_migrations;" \
              | tr -d '[:space:]'
          )"

          echo "Migration ledger entries: ${MIGRATION_COUNT}"

          if [ "${MIGRATION_COUNT}" -ne 17 ]; then
            echo "FATAL: Expected 17 entries in schema_migrations"

            psql "${DATABASE_URL}" \
              -c "SELECT version FROM schema_migrations ORDER BY version;"

            exit 1
          fi

          echo "QA database schema verified successfully"

      # -----------------------------------------------------
      # BACKEND
      # -----------------------------------------------------
      - name: Install backend dependencies
        working-directory: project/siged-lampa/versions/v0002/backend
        run: npm ci

      - name: Backend check
        working-directory: project/siged-lampa/versions/v0002/backend
        run: npm run check

      - name: Backend tests with PostgreSQL
        working-directory: project/siged-lampa/versions/v0002/backend
        env:
          APP_ENV: test
          NODE_ENV: test
          PERSISTENCE_MODE: postgres
          DATABASE_URL: postgresql://siged:siged_ci_password@127.0.0.1:5432/siged_lampa_qa
        run: npm test

      # -----------------------------------------------------
      # ARCHIVOS DE DESPLIEGUE
      # -----------------------------------------------------
      - name: Validate deployment files
        working-directory: project/siged-lampa/versions/v0002/infra/deployment
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f docker-compose.production.yml

          test -f scripts/validate-environment.sh
          test -f scripts/deploy-release.sh
          test -f scripts/run-migrations.sh
          test -f scripts/health-check.sh
          test -f scripts/smoke-test.sh
          test -f scripts/rollback.sh
          test -f scripts/cleanup-releases.sh

          bash -n scripts/validate-environment.sh
          bash -n scripts/deploy-release.sh
          bash -n scripts/run-migrations.sh
          bash -n scripts/health-check.sh
          bash -n scripts/smoke-test.sh
          bash -n scripts/rollback.sh
          bash -n scripts/cleanup-releases.sh

  # =========================================================
  # EMPAQUETADO
  # =========================================================
  package:
    name: Package release
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.ref
                || github.sha }}

      - name: Create V2 release tarball
        shell: bash
        run: |
          set -Eeuo pipefail

          test -d "${PROJECT_DIR}/backend"
          test -d "${PROJECT_DIR}/frontend"
          test -d "${PROJECT_DIR}/database"
          test -d "${PROJECT_DIR}/infra"

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.production' \
            --exclude='.env.qa.local' \
            --exclude='.env.test' \
            --exclude='coverage' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            --exclude='runs' \
            --exclude='backend/tests' \
            --exclude='frontend/src/e2e' \
            --exclude='*.log' \
            --exclude='*.pem' \
            --exclude='*.key' \
            -czf "/tmp/${ARCHIVE_NAME}" \
            -C "${PROJECT_DIR}" \
            .

          test -s "/tmp/${ARCHIVE_NAME}"

          echo "Release archive created:"
          ls -lh "/tmp/${ARCHIVE_NAME}"

      - name: Verify release structure and secrets
        shell: bash
        run: |
          set -Eeuo pipefail

          tar -tzf "/tmp/${ARCHIVE_NAME}" \
            > /tmp/release-files.txt

          grep -q '^\./backend/' /tmp/release-files.txt
          grep -q '^\./frontend/' /tmp/release-files.txt
          grep -q '^\./database/' /tmp/release-files.txt
          grep -q '^\./infra/deployment/' /tmp/release-files.txt

          if grep -Eiq \
            '(^|/)\.env\.production$|(^|/)\.env\.qa\.local$|\.pem$|\.key$|id_rsa$' \
            /tmp/release-files.txt
          then
            echo "FATAL: Release contains a secret or private-key file"
            exit 1
          fi

          echo "Release structure verified"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: /tmp/${{ env.ARCHIVE_NAME }}
          retention-days: 7
          if-no-files-found: error

  # =========================================================
  # DESPLIEGUE A EC2
  # =========================================================
  deploy:
    name: Deploy release to EC2
    runs-on: ubuntu-latest
    needs: package
    environment: production
    timeout-minutes: 45

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: /tmp

      - name: Verify downloaded artifact
        shell: bash
        run: |
          set -Eeuo pipefail

          test -s "/tmp/${ARCHIVE_NAME}"
          ls -lh "/tmp/${ARCHIVE_NAME}"

      - name: Setup SSH
        id: ssh_setup
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p ~/.ssh

          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" \
            | tr -d '\r' \
            > ~/.ssh/ec2_key

          chmod 600 ~/.ssh/ec2_key

          ssh-keyscan \
            -T 15 \
            -H "${{ secrets.EC2_HOST }}" \
            >> ~/.ssh/known_hosts 2>/dev/null

          chmod 600 ~/.ssh/known_hosts

      - name: Verify EC2 environment
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          test -f "$EC2_DIR/shared/.env.production" || {
            echo "FATAL: Missing $EC2_DIR/shared/.env.production"
            exit 1
          }

          docker --version
          docker compose version
          docker ps >/dev/null

          mkdir -p \
            "$EC2_DIR/releases" \
            "$EC2_DIR/backups" \
            "$EC2_DIR/logs"

          test -w "$EC2_DIR/releases" || {
            echo "FATAL: EC2 user cannot write to $EC2_DIR/releases"
            exit 1
          }

          echo "EC2 environment verified"
          REMOTE

      - name: Record previous release and prepare directory
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          CURRENT_LINK="$EC2_DIR/current"
          PREVIOUS_FILE="$EC2_DIR/previous_release.txt"
          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"

          rm -f "$PREVIOUS_FILE"

          if [ -L "$CURRENT_LINK" ]; then
            CURRENT_RELEASE="$(
              readlink -f "$CURRENT_LINK" || true
            )"

            case "$CURRENT_RELEASE" in
              "$EC2_DIR"/releases/*)
                if [ -d "$CURRENT_RELEASE" ]; then
                  basename "$CURRENT_RELEASE" \
                    > "$PREVIOUS_FILE"

                  echo "Previous release: $(cat "$PREVIOUS_FILE")"
                fi
                ;;

              *)
                echo "WARN: current symlink does not point to releases"
                ;;
            esac

          elif [ -e "$CURRENT_LINK" ]; then
            INVALID_CURRENT="$EC2_DIR/current.invalid.$(date +%s)"

            echo "WARN: current exists but is not a symlink"
            echo "Moving it to: $INVALID_CURRENT"

            mv "$CURRENT_LINK" "$INVALID_CURRENT"

          else
            echo "First deployment: no previous release recorded"
          fi

          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

          echo "Prepared release directory: $RELEASE_DIR"
          REMOTE

      - name: Transfer release to EC2
        shell: bash
        run: |
          set -Eeuo pipefail

          scp \
            -i ~/.ssh/ec2_key \
            "/tmp/${ARCHIVE_NAME}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/${ARCHIVE_NAME}"

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' ARCHIVE_NAME='${ARCHIVE_NAME}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"
          ARCHIVE_PATH="/tmp/$ARCHIVE_NAME"

          test -s "$ARCHIVE_PATH"

          tar \
            -xzf "$ARCHIVE_PATH" \
            -C "$RELEASE_DIR"

          rm -f "$ARCHIVE_PATH"

          test -d "$RELEASE_DIR/backend"
          test -d "$RELEASE_DIR/frontend"
          test -d "$RELEASE_DIR/database"
          test -d "$RELEASE_DIR/infra/deployment"

          test -f "$RELEASE_DIR/database/scripts/migrate.js"
          test -f "$RELEASE_DIR/database/scripts/seed.js"
          test -f "$RELEASE_DIR/database/scripts/verify-schema.js"

          echo "Release extracted successfully"
          REMOTE

      - name: Link shared production environment
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"
          ENV_FILE="$RELEASE_DIR/infra/deployment/.env.production"

          rm -f "$ENV_FILE"

          ln -s \
            "$EC2_DIR/shared/.env.production" \
            "$ENV_FILE"

          test -L "$ENV_FILE"
          test -f "$ENV_FILE"

          echo "Production environment linked"
          REMOTE

      - name: Validate production Compose
        id: deployment_gate
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"
          COMPOSE_FILE="$RELEASE_DIR/infra/deployment/docker-compose.production.yml"
          ENV_FILE="$RELEASE_DIR/infra/deployment/.env.production"

          test -f "$COMPOSE_FILE" || {
            echo "FATAL: Compose file not found: $COMPOSE_FILE"
            exit 1
          }

          test -f "$ENV_FILE" || {
            echo "FATAL: Environment file not found: $ENV_FILE"
            exit 1
          }

          grep -Eq '^POSTGRES_PASSWORD=.+$' "$ENV_FILE" || {
            echo "FATAL: POSTGRES_PASSWORD missing or empty"
            exit 1
          }

          grep -Eq '^JWT_SECRET=.+$' "$ENV_FILE" || {
            echo "FATAL: JWT_SECRET missing or empty"
            exit 1
          }

          echo "Validating Docker Compose configuration..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            config \
            >/dev/null

          echo "Docker Compose configuration valid"
          REMOTE

          echo "ready=true" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------
      # CONSTRUCCIÓN DE IMÁGENES
      # -----------------------------------------------------
      - name: Build production images
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"
          COMPOSE_FILE="$RELEASE_DIR/infra/deployment/docker-compose.production.yml"
          ENV_FILE="$RELEASE_DIR/infra/deployment/.env.production"

          cd "$RELEASE_DIR"

          echo "Pulling PostgreSQL image..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            pull postgres

          echo "Building backend and frontend images..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            build backend frontend

          echo "Production images built successfully"
          REMOTE

      # -----------------------------------------------------
      # LEVANTAR SOLO POSTGRESQL
      # -----------------------------------------------------
      - name: Start production database
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"
          COMPOSE_FILE="$RELEASE_DIR/infra/deployment/docker-compose.production.yml"
          ENV_FILE="$RELEASE_DIR/infra/deployment/.env.production"

          cd "$RELEASE_DIR"

          echo "Starting PostgreSQL only..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            up -d postgres

          echo "Waiting for PostgreSQL..."

          for attempt in $(seq 1 30); do
            if docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              exec -T postgres \
              pg_isready \
                -U siged \
                -d siged_lampa \
                --quiet
            then
              echo "PostgreSQL is ready"
              exit 0
            fi

            echo "PostgreSQL attempt ${attempt}/30"
            sleep 3
          done

          echo "FATAL: PostgreSQL did not become ready"

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            ps || true

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            logs --tail=100 postgres || true

          exit 1
          REMOTE

      # -----------------------------------------------------
      # COMPUERTA DE BASE DE DATOS
      # -----------------------------------------------------
      - name: Migrate, seed and verify production database
        id: production_database_gate
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"
          COMPOSE_FILE="$RELEASE_DIR/infra/deployment/docker-compose.production.yml"
          ENV_FILE="$RELEASE_DIR/infra/deployment/.env.production"

          BACKUP_DIR="$EC2_DIR/backups"
          BACKUP_FILE="$BACKUP_DIR/pre-migration-${RELEASE_ID}.sql"

          cd "$RELEASE_DIR"

          mkdir -p "$BACKUP_DIR"

          MIGRATION_FILES="$(
            find "$RELEASE_DIR/database/migrations" \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | wc -l \
              | tr -d '[:space:]'
          )"

          SEED_FILES="$(
            find "$RELEASE_DIR/database/seeds" \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | wc -l \
              | tr -d '[:space:]'
          )"

          echo "Migration files: $MIGRATION_FILES"
          echo "Seed files: $SEED_FILES"

          if [ "$MIGRATION_FILES" -ne 17 ]; then
            echo "FATAL: Production release does not contain 17 migrations"
            exit 1
          fi

          if [ "$SEED_FILES" -ne 5 ]; then
            echo "FATAL: Production release does not contain 5 seeds"
            exit 1
          fi

          echo "Creating database backup..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            exec -T postgres \
            pg_dump \
              -U siged \
              -d siged_lampa \
              --clean \
              --if-exists \
            > "$BACKUP_FILE"

          test -s "$BACKUP_FILE" || {
            echo "FATAL: Database backup was not created"
            exit 1
          }

          echo "Backup created: $BACKUP_FILE"

          echo "Applying production migrations..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            run \
            --rm \
            --no-deps \
            backend \
            node database/scripts/migrate.js

          echo "Applying production seeds..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            run \
            --rm \
            --no-deps \
            backend \
            node database/scripts/seed.js

          echo "Running complete schema verification..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            run \
            --rm \
            --no-deps \
            backend \
            node database/scripts/verify-schema.js

          APPLIED_MIGRATIONS="$(
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              exec -T postgres \
              psql \
                -U siged \
                -d siged_lampa \
                -Atc "SELECT COUNT(*) FROM schema_migrations;" \
              | tr -d '[:space:]'
          )"

          INVALID_LEDGER_ENTRIES="$(
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              exec -T postgres \
              psql \
                -U siged \
                -d siged_lampa \
                -Atc "
                  SELECT COUNT(*)
                  FROM schema_migrations
                  WHERE version IS NULL
                     OR checksum_sha256 IS NULL;
                " \
              | tr -d '[:space:]'
          )"

          CRITICAL_TABLES="$(
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              exec -T postgres \
              psql \
                -U siged \
                -d siged_lampa \
                -Atc "
                  SELECT COUNT(*)
                  FROM (
                    VALUES
                      ('users'),
                      ('roles'),
                      ('sessions'),
                      ('citizen_accounts'),
                      ('citizen_profiles'),
                      ('citizen_sessions'),
                      ('audit_events'),
                      ('schema_migrations')
                  ) AS required_table(table_name)
                  WHERE to_regclass(
                    'public.' || required_table.table_name
                  ) IS NOT NULL;
                " \
              | tr -d '[:space:]'
          )"

          FUNCTIONAL_TABLES="$(
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              exec -T postgres \
              psql \
                -U siged \
                -d siged_lampa \
                -Atc "
                  SELECT COUNT(*)
                  FROM information_schema.tables
                  WHERE table_schema = 'public'
                    AND table_type = 'BASE TABLE'
                    AND table_name <> 'schema_migrations';
                " \
              | tr -d '[:space:]'
          )"

          DEMO_CITIZEN_ACCOUNTS="$(
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              exec -T postgres \
              psql \
                -U siged \
                -d siged_lampa \
                -Atc "
                  SELECT COUNT(*)
                  FROM citizen_accounts
                  WHERE lower(email) = lower('ciudadano@email.com')
                    AND status = 'active'
                    AND deleted_at IS NULL;
                " \
              | tr -d '[:space:]'
          )"

          ADMIN_ACCOUNTS="$(
            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              exec -T postgres \
              psql \
                -U siged \
                -d siged_lampa \
                -Atc "
                  SELECT COUNT(*)
                  FROM users
                  WHERE username = 'admin'
                    AND status = 'active'
                    AND deleted_at IS NULL;
                " \
              | tr -d '[:space:]'
          )"

          echo "Applied migrations: $APPLIED_MIGRATIONS"
          echo "Invalid ledger entries: $INVALID_LEDGER_ENTRIES"
          echo "Critical tables found: $CRITICAL_TABLES"
          echo "Functional tables found: $FUNCTIONAL_TABLES"
          echo "Active demo citizen accounts: $DEMO_CITIZEN_ACCOUNTS"
          echo "Active admin accounts: $ADMIN_ACCOUNTS"

          if [ "$APPLIED_MIGRATIONS" -ne "$MIGRATION_FILES" ]; then
            echo "FATAL: Production migration ledger is incomplete"
            exit 1
          fi

          if [ "$INVALID_LEDGER_ENTRIES" -ne 0 ]; then
            echo "FATAL: Invalid schema_migrations entries detected"
            exit 1
          fi

          if [ "$CRITICAL_TABLES" -ne 8 ]; then
            echo "FATAL: One or more critical production tables are missing"
            exit 1
          fi

          if [ "$FUNCTIONAL_TABLES" -lt 40 ]; then
            echo "FATAL: Fewer than 40 functional tables were found"
            exit 1
          fi

          if [ "$DEMO_CITIZEN_ACCOUNTS" -ne 1 ]; then
            echo "FATAL: Demo citizen account was not seeded correctly"
            exit 1
          fi

          if [ "$ADMIN_ACCOUNTS" -ne 1 ]; then
            echo "FATAL: Admin account was not seeded correctly"
            exit 1
          fi

          echo "PRODUCTION_DATABASE_GATE_PASS"
          REMOTE

          echo "ready=true" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------
      # LEVANTAR BACKEND Y FRONTEND
      # -----------------------------------------------------
      - name: Start production application
        if: ${{ steps.production_database_gate.outputs.ready == 'true' }}
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"
          COMPOSE_FILE="$RELEASE_DIR/infra/deployment/docker-compose.production.yml"
          ENV_FILE="$RELEASE_DIR/infra/deployment/.env.production"

          cd "$RELEASE_DIR"

          echo "Starting backend and frontend..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            up -d backend frontend --remove-orphans

          echo "Production application started"
          REMOTE

      # -----------------------------------------------------
      # HEALTH CHECK
      # -----------------------------------------------------
      - name: Production health check
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"
          COMPOSE_FILE="$RELEASE_DIR/infra/deployment/docker-compose.production.yml"
          ENV_FILE="$RELEASE_DIR/infra/deployment/.env.production"

          wait_for_container() {
            local container_name="$1"
            local max_retries="$2"
            local retry=0
            local status=""

            while [ "$retry" -lt "$max_retries" ]; do
              status="$(
                docker inspect \
                  --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
                  "$container_name" \
                  2>/dev/null || true
              )"

              if [ "$status" = "healthy" ]; then
                echo "$container_name: healthy"
                return 0
              fi

              retry=$((retry + 1))

              echo "$container_name: ${status:-not-created}, attempt ${retry}/${max_retries}"

              sleep 5
            done

            echo "FATAL: $container_name did not become healthy"

            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              ps || true

            docker compose \
              --env-file "$ENV_FILE" \
              -f "$COMPOSE_FILE" \
              logs --tail=150 "$container_name" || true

            return 1
          }

          wait_for_container siged-db-production 20
          wait_for_container siged-api-production 24
          wait_for_container siged-web-production 12

          echo "Verifying schema from running backend..."

          docker compose \
            --env-file "$ENV_FILE" \
            -f "$COMPOSE_FILE" \
            exec -T backend \
            node database/scripts/verify-schema.js

          API_HEALTH_BODY="$(
            curl \
              -fsS \
              http://127.0.0.1/api/health
          )"

          echo "$API_HEALTH_BODY"

          echo "$API_HEALTH_BODY" \
            | grep -Eq '"status"[[:space:]]*:[[:space:]]*"healthy"' || {
                echo "FATAL: API health response is not healthy"
                exit 1
              }

          DATABASE_HEALTH_CODE="$(
            curl \
              -s \
              -o /tmp/database-health.json \
              -w '%{http_code}' \
              http://127.0.0.1/api/health/database \
              || echo "000"
          )"

          cat /tmp/database-health.json || true

          if [ "$DATABASE_HEALTH_CODE" != "200" ]; then
            echo "FATAL: Database health returned $DATABASE_HEALTH_CODE"
            exit 1
          fi

          grep -Eq \
            '"migrations"[[:space:]]*:[[:space:]]*"up_to_date"' \
            /tmp/database-health.json || {
              echo "FATAL: Database migrations are not up to date"
              exit 1
            }

          echo "Production health check passed"
          REMOTE

      # -----------------------------------------------------
      # SMOKE TEST REAL
      # -----------------------------------------------------
      - name: Production smoke test
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "bash -s" <<'REMOTE'
          set -Eeuo pipefail

          BASE_URL="http://127.0.0.1"

          FRONTEND_CODE="$(
            curl \
              -s \
              -o /dev/null \
              -w '%{http_code}' \
              "$BASE_URL/" \
              || echo "000"
          )"

          if [ "$FRONTEND_CODE" != "200" ]; then
            echo "SMOKE FAIL: frontend returned $FRONTEND_CODE"
            exit 1
          fi

          echo "frontend /: $FRONTEND_CODE"

          API_CODE="$(
            curl \
              -s \
              -o /dev/null \
              -w '%{http_code}' \
              "$BASE_URL/api/health" \
              || echo "000"
          )"

          if [ "$API_CODE" != "200" ]; then
            echo "SMOKE FAIL: /api/health returned $API_CODE"
            exit 1
          fi

          echo "/api/health: $API_CODE"

          CITIZEN_LOGIN_FILE="/tmp/citizen-login-response.json"

          CITIZEN_LOGIN_CODE="$(
            curl \
              -sS \
              -o "$CITIZEN_LOGIN_FILE" \
              -w '%{http_code}' \
              -X POST \
              -H 'Content-Type: application/json' \
              -d '{
                "email": "ciudadano@email.com",
                "password": "ciudadano123"
              }' \
              "$BASE_URL/api/api/v1/auth/citizen-login" \
              || echo "000"
          )"

          cat "$CITIZEN_LOGIN_FILE" || true

          if [ "$CITIZEN_LOGIN_CODE" != "200" ]; then
            echo "SMOKE FAIL: citizen login returned $CITIZEN_LOGIN_CODE"
            exit 1
          fi

          grep -Eq \
            '"email"[[:space:]]*:[[:space:]]*"ciudadano@email.com"' \
            "$CITIZEN_LOGIN_FILE" || {
              echo "SMOKE FAIL: citizen login response is invalid"
              exit 1
            }

          grep -Eq \
            '"(token|access_token)"[[:space:]]*:' \
            "$CITIZEN_LOGIN_FILE" || {
              echo "SMOKE FAIL: citizen login did not return a token"
              exit 1
            }

          echo "Citizen login: 200"
          echo "Production smoke test passed"
          REMOTE

      # -----------------------------------------------------
      # FINALIZAR RELEASE
      # -----------------------------------------------------
      - name: Finalize release
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"
          CURRENT_LINK="$EC2_DIR/current"

          ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

          echo "Active release:"
          readlink -f "$CURRENT_LINK"

          mapfile -t RELEASES < <(
            find "$EC2_DIR/releases" \
              -mindepth 1 \
              -maxdepth 1 \
              -type d \
              -printf '%T@ %p\n' \
              | sort -nr \
              | cut -d' ' -f2-
          )

          if [ "${#RELEASES[@]}" -gt 3 ]; then
            for OLD_RELEASE in "${RELEASES[@]:3}"; do
              if [ "$OLD_RELEASE" != "$RELEASE_DIR" ]; then
                echo "Removing old release: $OLD_RELEASE"
                rm -rf "$OLD_RELEASE"
              fi
            done
          fi

          echo "Release finalized successfully"
          REMOTE

      # -----------------------------------------------------
      # ROLLBACK
      # -----------------------------------------------------
      - name: Rollback on failure
        if: ${{ failure() && steps.deployment_gate.outputs.ready == 'true' }}
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "EC2_DIR='${EC2_DIR}' RELEASE_ID='${RELEASE_ID}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          PREVIOUS_FILE="$EC2_DIR/previous_release.txt"
          FAILED_RELEASE_DIR="$EC2_DIR/releases/$RELEASE_ID"

          if [ ! -f "$PREVIOUS_FILE" ]; then
            echo "WARN: First deployment. No previous release available."
            echo "Rollback skipped."
            exit 0
          fi

          PREVIOUS_ID="$(
            tr -d '[:space:]' < "$PREVIOUS_FILE"
          )"

          if [ -z "$PREVIOUS_ID" ] || [ "$PREVIOUS_ID" = "current" ]; then
            echo "WARN: Invalid previous release ID: ${PREVIOUS_ID:-empty}"
            rm -f "$PREVIOUS_FILE"
            echo "Rollback skipped."
            exit 0
          fi

          PREVIOUS_DIR="$EC2_DIR/releases/$PREVIOUS_ID"

          if [ ! -d "$PREVIOUS_DIR" ]; then
            echo "WARN: Previous release does not exist: $PREVIOUS_DIR"
            rm -f "$PREVIOUS_FILE"
            echo "Rollback skipped."
            exit 0
          fi

          PREVIOUS_COMPOSE="$PREVIOUS_DIR/infra/deployment/docker-compose.production.yml"
          PREVIOUS_ENV="$PREVIOUS_DIR/infra/deployment/.env.production"

          if [ ! -f "$PREVIOUS_COMPOSE" ]; then
            echo "WARN: Previous Compose file is missing"
            echo "Rollback skipped"
            exit 0
          fi

          rm -f "$PREVIOUS_ENV"

          ln -s \
            "$EC2_DIR/shared/.env.production" \
            "$PREVIOUS_ENV"

          if [ -f "$FAILED_RELEASE_DIR/infra/deployment/docker-compose.production.yml" ] \
            && [ -f "$FAILED_RELEASE_DIR/infra/deployment/.env.production" ]
          then
            docker compose \
              --env-file "$FAILED_RELEASE_DIR/infra/deployment/.env.production" \
              -f "$FAILED_RELEASE_DIR/infra/deployment/docker-compose.production.yml" \
              down --timeout 30 || true
          fi

          echo "Rolling back application to: $PREVIOUS_ID"

          cd "$PREVIOUS_DIR"

          docker compose \
            --env-file "$PREVIOUS_ENV" \
            -f "$PREVIOUS_COMPOSE" \
            up -d --build --remove-orphans

          ln -sfn \
            "$PREVIOUS_DIR" \
            "$EC2_DIR/current"

          echo "Rollback completed successfully"
          REMOTE

      - name: Remove temporary SSH key
        if: always()
        shell: bash
        run: |
          rm -f ~/.ssh/ec2_key