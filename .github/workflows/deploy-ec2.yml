name: Deploy to EC2

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to deploy
        required: false
        default: main

concurrency:
  group: siged-lampa-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  PROJECT_DIR: project/siged-lampa/versions/v0002
  EC2_DIR: /opt/siged-lampa

  RELEASE_ID: ${{ github.run_number }}-${{ github.sha }}
  ARTIFACT_NAME: siged-lampa-release-${{ github.run_number }}
  ARCHIVE_NAME: siged-lampa-release-${{ github.run_number }}.tar.gz

jobs:
  # =========================================================
  # VALIDACIÓN
  # =========================================================
  validate:
    name: Validate application
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine

        env:
          POSTGRES_DB: siged_lampa_qa
          POSTGRES_USER: siged
          POSTGRES_PASSWORD: siged_ci_password

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U siged -d siged_lampa_qa"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      CI: "true"

      APP_ENV: test
      NODE_ENV: test
      PERSISTENCE_MODE: postgres

      POSTGRES_DB: siged_lampa_qa
      POSTGRES_USER: siged
      POSTGRES_PASSWORD: siged_ci_password
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432

      DATABASE_URL: postgresql://siged:siged_ci_password@127.0.0.1:5432/siged_lampa_qa

      PORT: 3100

      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      JWT_EXPIRES_IN: 1h

      BODY_LIMIT: 10mb

      DB_POOL_MIN: 0
      DB_POOL_MAX: 10
      DB_CONNECTION_TIMEOUT_MS: 5000
      DB_QUERY_TIMEOUT_MS: 10000

      DOCUMENT_MAX_FILE_BYTES: 10485760
      DOCUMENT_STORAGE_DIR: /tmp/siged-documents

      OIRS_TRACKING_TOKEN_TTL: 90d

      VITE_API_BASE_URL: /api
      VITE_REQUEST_TIMEOUT_MS: 12000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.ref
                || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            project/siged-lampa/versions/v0002/package-lock.json
            project/siged-lampa/versions/v0002/frontend/package-lock.json
            project/siged-lampa/versions/v0002/backend/package-lock.json

      - name: Install PostgreSQL client
        shell: bash
        run: |
          set -Eeuo pipefail

          sudo apt-get update
          sudo apt-get install -y postgresql-client

          psql --version
          pg_isready --version

      - name: Prepare CI environment
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p /tmp/siged-documents

          test -d "${PROJECT_DIR}/frontend"
          test -d "${PROJECT_DIR}/backend"
          test -d "${PROJECT_DIR}/database"
          test -d "${PROJECT_DIR}/infra"

      # -----------------------------------------------------
      # FRONTEND
      # -----------------------------------------------------
      - name: Install frontend dependencies
        working-directory: project/siged-lampa/versions/v0002/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: project/siged-lampa/versions/v0002/frontend
        run: npm run lint

      - name: Frontend tests
        working-directory: project/siged-lampa/versions/v0002/frontend
        run: npm test

      - name: Frontend build
        working-directory: project/siged-lampa/versions/v0002/frontend
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: /api
          VITE_REQUEST_TIMEOUT_MS: 12000
        run: npm run build

      # -----------------------------------------------------
      # POSTGRESQL QA
      # -----------------------------------------------------
      - name: Install V2 root dependencies
        working-directory: project/siged-lampa/versions/v0002
        run: npm ci

      - name: Wait for PostgreSQL QA
        shell: bash
        run: |
          set -Eeuo pipefail

          for attempt in $(seq 1 30); do
            if pg_isready \
              -h 127.0.0.1 \
              -p 5432 \
              -U siged \
              -d siged_lampa_qa
            then
              echo "PostgreSQL QA is ready"
              exit 0
            fi

            echo "Waiting for PostgreSQL QA: attempt ${attempt}/30"
            sleep 2
          done

          echo "FATAL: PostgreSQL QA did not become ready"
          exit 1

      - name: Validate migration and seed inventory
        working-directory: project/siged-lampa/versions/v0002
        shell: bash
        run: |
          set -Eeuo pipefail

          MIGRATION_COUNT="$(
            find database/migrations \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | wc -l \
              | tr -d '[:space:]'
          )"

          SEED_COUNT="$(
            find database/seeds \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | wc -l \
              | tr -d '[:space:]'
          )"

          echo "Migrations found: ${MIGRATION_COUNT}"
          echo "Seeds found: ${SEED_COUNT}"

          if [ "${MIGRATION_COUNT}" -ne 17 ]; then
            echo "FATAL: Expected 17 migration files"
            find database/migrations \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | sort
            exit 1
          fi

          if [ "${SEED_COUNT}" -ne 5 ]; then
            echo "FATAL: Expected 5 seed files"
            find database/seeds \
              -maxdepth 1 \
              -type f \
              -name '*.sql' \
              | sort
            exit 1
          fi

      - name: Apply QA migrations with migration ledger
        working-directory: project/siged-lampa/versions/v0002
        shell: bash
        env:
          DATABASE_URL: postgresql://siged:siged_ci_password@127.0.0.1:5432/siged_lampa_qa
        run: |
          set -Eeuo pipefail

          node database/scripts/migrate.js

      - name: Apply QA seeds
        working-directory: project/siged-lampa/versions/v0002
        shell: bash
        env:
          DATABASE_URL: postgresql://siged:siged_ci_password@127.0.0.1:5432/siged_lampa_qa
        run: |
          set -Eeuo pipefail

          node database/scripts/seed.js

      - name: Verify QA schema and migration ledger
        working-directory: project/siged-lampa/versions/v0002
        shell: bash
        env:
          DATABASE_URL: postgresql://siged:siged_ci_password@127.0.0.1:5432/siged_lampa_qa
        run: |
          set -Eeuo pipefail

          node database/scripts/verify-schema.js

          MIGRATION_COUNT="$(
            psql "${DATABASE_URL}" \
              -Atc "SELECT COUNT(*) FROM schema_migrations;" \
              | tr -d '[:space:]'
          )"

          FUNCTIONAL_TABLE_COUNT="$(
            psql "${DATABASE_URL}" -Atc "
              SELECT COUNT(*)
              FROM information_schema.tables
              WHERE table_schema = 'public'
                AND table_type = 'BASE TABLE'
                AND table_name <> 'schema_migrations';
            " | tr -d '[:space:]'
          )"

          echo "Migration ledger entries: ${MIGRATION_COUNT}"
          echo "Functional tables: ${FUNCTIONAL_TABLE_COUNT}"

          if [ "${MIGRATION_COUNT}" -ne 17 ]; then
            echo "FATAL: Expected 17 entries in schema_migrations"
            psql "${DATABASE_URL}" \
              -c "SELECT version FROM schema_migrations ORDER BY version;"
            exit 1
          fi

          if [ "${FUNCTIONAL_TABLE_COUNT}" -ne 40 ]; then
            echo "FATAL: Expected 40 functional tables"
            exit 1
          fi

      # -----------------------------------------------------
      # BACKEND
      # -----------------------------------------------------
      - name: Install backend dependencies
        working-directory: project/siged-lampa/versions/v0002/backend
        run: npm ci

      - name: Backend check
        working-directory: project/siged-lampa/versions/v0002/backend
        run: npm run check

      - name: Backend tests with PostgreSQL
        working-directory: project/siged-lampa/versions/v0002/backend
        env:
          APP_ENV: test
          NODE_ENV: test
          PERSISTENCE_MODE: postgres
          DATABASE_URL: postgresql://siged:siged_ci_password@127.0.0.1:5432/siged_lampa_qa
        run: npm test

      # -----------------------------------------------------
      # ARCHIVOS DE DEPLOYMENT
      # -----------------------------------------------------
      - name: Validate deployment scripts
        working-directory: project/siged-lampa/versions/v0002/infra/deployment
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f docker-compose.production.yml

          test -f scripts/validate-environment.sh
          test -f scripts/deploy-release.sh
          test -f scripts/run-migrations.sh
          test -f scripts/health-check.sh
          test -f scripts/smoke-test.sh
          test -f scripts/rollback.sh
          test -f scripts/cleanup-releases.sh

          bash -n scripts/validate-environment.sh
          bash -n scripts/deploy-release.sh
          bash -n scripts/run-migrations.sh
          bash -n scripts/health-check.sh
          bash -n scripts/smoke-test.sh
          bash -n scripts/rollback.sh
          bash -n scripts/cleanup-releases.sh

  # =========================================================
  # EMPAQUETADO DE V0002
  # =========================================================
  package:
    name: Package release
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: >-
            ${{ github.event_name == 'workflow_dispatch'
                && inputs.ref
                || github.sha }}

      - name: Create V2 release tarball
        shell: bash
        run: |
          set -Eeuo pipefail

          test -d "${PROJECT_DIR}/backend"
          test -d "${PROJECT_DIR}/frontend"
          test -d "${PROJECT_DIR}/database"
          test -d "${PROJECT_DIR}/infra"

          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='.env.production' \
            --exclude='.env.qa.local' \
            --exclude='.env.test' \
            --exclude='coverage' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            --exclude='runs' \
            --exclude='backend/tests' \
            --exclude='frontend/src/e2e' \
            --exclude='*.log' \
            --exclude='*.pem' \
            --exclude='*.key' \
            -czf "/tmp/${ARCHIVE_NAME}" \
            -C "${PROJECT_DIR}" \
            .

          test -s "/tmp/${ARCHIVE_NAME}"

          echo "Release archive created:"
          ls -lh "/tmp/${ARCHIVE_NAME}"

      - name: Verify release structure and secrets
        shell: bash
        run: |
          set -Eeuo pipefail

          tar -tzf "/tmp/${ARCHIVE_NAME}" > /tmp/release-files.txt

          grep -q '^\./backend/' /tmp/release-files.txt
          grep -q '^\./frontend/' /tmp/release-files.txt
          grep -q '^\./database/' /tmp/release-files.txt
          grep -q '^\./infra/deployment/' /tmp/release-files.txt

          if grep -Eiq \
            '(^|/)\.env\.production$|(^|/)\.env\.qa\.local$|\.pem$|\.key$|id_rsa$' \
            /tmp/release-files.txt
          then
            echo "FATAL: Release contains a secret or private-key file"
            exit 1
          fi

          echo "Release structure verified"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: /tmp/${{ env.ARCHIVE_NAME }}
          retention-days: 7
          if-no-files-found: error

  # =========================================================
  # DESPLIEGUE A EC2
  # =========================================================
  deploy:
    name: Deploy release to EC2
    runs-on: ubuntu-latest
    needs: package
    environment: production
    timeout-minutes: 30

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: /tmp

      - name: Verify downloaded artifact
        shell: bash
        run: |
          set -Eeuo pipefail

          test -s "/tmp/${ARCHIVE_NAME}"
          ls -lh "/tmp/${ARCHIVE_NAME}"

      - name: Setup SSH
        shell: bash
        run: |
          set -Eeuo pipefail

          mkdir -p ~/.ssh

          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" \
            | tr -d '\r' \
            > ~/.ssh/ec2_key

          chmod 600 ~/.ssh/ec2_key

          ssh-keyscan \
            -T 15 \
            -H "${{ secrets.EC2_HOST }}" \
            >> ~/.ssh/known_hosts 2>/dev/null

          chmod 600 ~/.ssh/known_hosts

      - name: Verify EC2 environment
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              test -f '${EC2_DIR}/shared/.env.production' || {
                echo 'FATAL: Missing ${EC2_DIR}/shared/.env.production'
                exit 1
              }

              docker --version
              docker compose version
              docker ps >/dev/null

              mkdir -p \
                '${EC2_DIR}/releases' \
                '${EC2_DIR}/backups' \
                '${EC2_DIR}/logs'

              test -w '${EC2_DIR}/releases' || {
                echo 'FATAL: EC2 user cannot write to ${EC2_DIR}/releases'
                exit 1
              }
            "

      - name: Record current release and prepare directory
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              CURRENT_RELEASE=\$(readlink -f '${EC2_DIR}/current' 2>/dev/null || true)

              if [ -n \"\$CURRENT_RELEASE\" ]; then
                basename \"\$CURRENT_RELEASE\" \
                  > '${EC2_DIR}/previous_release.txt'
              else
                rm -f '${EC2_DIR}/previous_release.txt'
              fi

              rm -rf '${EC2_DIR}/releases/${RELEASE_ID}'
              mkdir -p '${EC2_DIR}/releases/${RELEASE_ID}'
            "

      - name: Transfer release to EC2
        shell: bash
        run: |
          set -Eeuo pipefail

          scp \
            -i ~/.ssh/ec2_key \
            "/tmp/${ARCHIVE_NAME}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/${ARCHIVE_NAME}"

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              tar \
                -xzf '/tmp/${ARCHIVE_NAME}' \
                -C '${EC2_DIR}/releases/${RELEASE_ID}'

              rm -f '/tmp/${ARCHIVE_NAME}'

              test -d '${EC2_DIR}/releases/${RELEASE_ID}/backend'
              test -d '${EC2_DIR}/releases/${RELEASE_ID}/frontend'
              test -d '${EC2_DIR}/releases/${RELEASE_ID}/database'
              test -d '${EC2_DIR}/releases/${RELEASE_ID}/infra/deployment'
            "

      - name: Link shared production environment
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              ln -sfn \
                '${EC2_DIR}/shared/.env.production' \
                '${EC2_DIR}/releases/${RELEASE_ID}/infra/deployment/.env.production'

              test -L \
                '${EC2_DIR}/releases/${RELEASE_ID}/infra/deployment/.env.production'
            "

      - name: Validate production environment
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              cd '${EC2_DIR}/releases/${RELEASE_ID}'

              RELEASE_ID='${RELEASE_ID}' \
              COMPOSE_PROJECT_NAME='siged-lampa' \
              bash infra/deployment/scripts/validate-environment.sh
            "

      - name: Deploy release
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              cd '${EC2_DIR}/releases/${RELEASE_ID}'

              RELEASE_ID='${RELEASE_ID}' \
              COMPOSE_PROJECT_NAME='siged-lampa' \
              bash infra/deployment/scripts/deploy-release.sh
            "

      - name: Run database migrations
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              cd '${EC2_DIR}/releases/${RELEASE_ID}'

              RELEASE_ID='${RELEASE_ID}' \
              COMPOSE_PROJECT_NAME='siged-lampa' \
              bash infra/deployment/scripts/run-migrations.sh
            "

      - name: Health check
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              cd '${EC2_DIR}/releases/${RELEASE_ID}'

              RELEASE_ID='${RELEASE_ID}' \
              COMPOSE_PROJECT_NAME='siged-lampa' \
              bash infra/deployment/scripts/health-check.sh
            "

      - name: Smoke test
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              cd '${EC2_DIR}/releases/${RELEASE_ID}'

              RELEASE_ID='${RELEASE_ID}' \
              COMPOSE_PROJECT_NAME='siged-lampa' \
              SMOKE_BASE_URL='http://127.0.0.1' \
              bash infra/deployment/scripts/smoke-test.sh
            "

      - name: Finalize release
        if: success()
        shell: bash
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -Eeuo pipefail

              ln -sfn \
                '${EC2_DIR}/releases/${RELEASE_ID}' \
                '${EC2_DIR}/current'

              RELEASE_ID='${RELEASE_ID}' \
              CLEANUP_KEEP='3' \
              bash '${EC2_DIR}/releases/${RELEASE_ID}/infra/deployment/scripts/cleanup-releases.sh'

              echo 'Active release:'
              readlink -f '${EC2_DIR}/current'
            "

      - name: Rollback on failure
        if: failure()
        shell: bash
        run: |
          ssh \
            -i ~/.ssh/ec2_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "
              set -u

              RELEASE_DIR='${EC2_DIR}/releases/${RELEASE_ID}'
              PREVIOUS_ID=\$(cat '${EC2_DIR}/previous_release.txt' 2>/dev/null || true)

              if [ -z \"\$PREVIOUS_ID\" ]; then
                echo 'WARN: No previous release is available for rollback.'
                exit 0
              fi

              if [ ! -d \"\$RELEASE_DIR\" ]; then
                echo 'WARN: Failed release directory does not exist.'
                exit 0
              fi

              if [ ! -f \"\$RELEASE_DIR/infra/deployment/scripts/rollback.sh\" ]; then
                echo 'WARN: Rollback script is unavailable.'
                exit 0
              fi

              cd \"\$RELEASE_DIR\"

              RELEASE_ID='${RELEASE_ID}' \
              PREVIOUS_ID=\"\$PREVIOUS_ID\" \
              COMPOSE_PROJECT_NAME='siged-lampa' \
              bash infra/deployment/scripts/rollback.sh
            "

      - name: Remove temporary SSH key
        if: always()
        shell: bash
        run: |
          rm -f ~/.ssh/ec2_key