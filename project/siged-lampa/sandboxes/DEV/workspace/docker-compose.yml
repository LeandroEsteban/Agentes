services:
  app:
    build: .
    ports:
      - "4173:4173"
    env_file:
      - .env.example
    depends_on:
      - postgres
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: siged_lampa
      POSTGRES_USER: siged
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - siged_pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
volumes:
  siged_pgdata:
