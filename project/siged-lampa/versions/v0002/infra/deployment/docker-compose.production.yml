services:
  postgres:
    image: postgres:16-alpine
    container_name: siged-db-production
    env_file: .env.production
    environment:
      POSTGRES_DB: siged_lampa
      POSTGRES_USER: siged
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata_production:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siged -d siged_lampa"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - siged-production-net

  backend:
    build:
      context: ../..
      dockerfile: backend/Dockerfile
      target: production
    container_name: siged-api-production
    env_file: .env.production
    environment:
      APP_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://siged:${POSTGRES_PASSWORD:?}@postgres:5432/siged_lampa
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      PERSISTENCE_MODE: postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    networks:
      - siged-production-net

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: /api
        VITE_REQUEST_TIMEOUT_MS: "12000"
        VITE_MAX_UPLOAD_BYTES: "10485760"
        VITE_DATA_MODE: real
        VITE_ENABLE_DEMO_FALLBACK: "false"
    container_name: siged-web-production
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - siged-production-net

networks:
  siged-production-net:
    driver: bridge

volumes:
  pgdata_production:
